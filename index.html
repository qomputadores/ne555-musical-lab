<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>555 Piano Lab V3.0</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX transformation in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="bg-slate-950">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useCallback, useRef, useEffect } = React;

        // Custom Icon Component to handle Lucide in CDN
        const Icon = ({ name, size = 24, className = "" }) => {
            const [svg, setSvg] = useState("");
            useEffect(() => {
                if (window.lucide) {
                    const iconSvg = window.lucide.createIcons();
                }
            }, []);
            return <i data-lucide={name} style={{width: size, height: size}} className={className}></i>;
        };

        const App = () => {
            const [selectedNote, setSelectedNote] = useState('C4');
            const [isAudioEnabled, setIsAudioEnabled] = useState(true);
            const audioCtxRef = useRef(null);

            const pianoData = [
                { note: 'C4', expected: 261.63, obtained: 261.81, idealR2: 27017, association: '27 kΩ (1 resistor)', realR2: 27000, error: 0.07, color: 'bg-rose-500', text: 'text-rose-500' },
                { note: 'D4', expected: 293.66, obtained: 293.87, idealR2: 24003, association: '12k + 12k (Series)', realR2: 24000, error: 0.07, color: 'bg-orange-500', text: 'text-orange-500' },
                { note: 'E4', expected: 329.63, obtained: 329.80, idealR2: 21323, association: '39k // 47k (Parallel)', realR2: 21313, error: 0.05, color: 'bg-amber-500', text: 'text-amber-500' },
                { note: 'F4', expected: 349.23, obtained: 351.21, idealR2: 20117, association: '10k + 10k (Series)', realR2: 20000, error: 0.56, color: 'bg-emerald-500', text: 'text-emerald-500' },
                { note: 'G4', expected: 392.00, obtained: 389.18, idealR2: 17857, association: '18 kΩ (1 resistor)', realR2: 18000, error: 0.72, color: 'bg-blue-500', text: 'text-blue-500' },
                { note: 'A4', expected: 440.00, obtained: 439.02, idealR2: 15863, association: '15k + 820 (Series)', realR2: 15820, error: 0.22, color: 'bg-indigo-500', text: 'text-indigo-500' },
                { note: 'B4', expected: 493.88, obtained: 494.75, idealR2: 14089, association: '22k // 39k (Parallel)', realR2: 14065, error: 0.17, color: 'bg-purple-500', text: 'text-purple-500' },
                { note: 'C5', expected: 523.25, obtained: 523.63, idealR2: 13264, association: '22k // 33k (Parallel)', realR2: 13200, error: 0.07, color: 'bg-fuchsia-500', text: 'text-fuchsia-500' },
            ];

            const currentData = pianoData.find(d => d.note === selectedNote);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [selectedNote]);

            const playNoteSound = useCallback((frequency) => {
                if (!isAudioEnabled) return;
                try {
                    if (!audioCtxRef.current) {
                        audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                    }
                    const ctx = audioCtxRef.current;
                    if (ctx.state === 'suspended') ctx.resume();
                    const oscillator = ctx.createOscillator();
                    const gainNode = ctx.createGain();
                    oscillator.type = 'square';
                    oscillator.frequency.setValueAtTime(frequency, ctx.currentTime);
                    gainNode.gain.setValueAtTime(0, ctx.currentTime);
                    gainNode.gain.linearRampToValueAtTime(0.08, ctx.currentTime + 0.05);
                    gainNode.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.8);
                    oscillator.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    oscillator.start();
                    oscillator.stop(ctx.currentTime + 0.8);
                } catch (e) { console.error(e); }
            }, [isAudioEnabled]);

            const formatValue = (num, decimals = 2) => {
                let parts = num.toFixed(decimals).split('.');
                parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ".");
                return parts.join(',');
            };

            return (
                <div className="min-h-screen bg-slate-950 text-slate-100 p-4 md:p-8 selection:bg-indigo-500/30">
                    <div className="max-w-5xl mx-auto flex flex-col min-h-screen">
                        
                        <header className="mb-10 text-center relative">
                            <div className="absolute right-0 top-0">
                                <button onClick={() => setIsAudioEnabled(!isAudioEnabled)} className={`p-3 rounded-full transition-all border ${isAudioEnabled ? 'bg-emerald-500/10 border-emerald-500/20 text-emerald-400' : 'bg-rose-500/10 border-rose-500/20 text-rose-400'}`}>
                                    <i data-lucide={isAudioEnabled ? "volume-2" : "volume-x"}></i>
                                </button>
                            </div>
                            <div className="inline-flex items-center gap-3 mb-4">
                                <div className="p-3 bg-gradient-to-br from-indigo-600 to-indigo-800 rounded-2xl shadow-lg shadow-indigo-500/20">
                                    <i data-lucide="music" className="text-white w-8 h-8"></i>
                                </div>
                                <h1 className="text-4xl font-black tracking-tight text-white uppercase">555 Piano <span className="text-indigo-400">Lab</span></h1>
                            </div>
                            <p className="text-slate-400 max-w-md mx-auto text-sm md:text-base">Interactive circuit analysis and real-time sound synthesis for the 555 timer project.</p>
                        </header>

                        <div className="mb-12 flex justify-center items-center gap-2 bg-slate-900 p-8 rounded-3xl border border-slate-800 shadow-2xl overflow-x-auto">
                            {pianoData.map((item) => (
                                <button key={item.note} onClick={() => { setSelectedNote(item.note); playNoteSound(item.obtained); }}
                                    className={`group relative flex flex-col justify-end items-center pb-6 w-16 h-56 md:w-20 md:h-72 rounded-b-xl transition-all duration-300 overflow-hidden ${selectedNote === item.note ? `${item.color} scale-105 z-10 shadow-2xl` : 'bg-white hover:bg-slate-200'}`}>
                                    {selectedNote !== item.note && <div className={`absolute top-0 left-0 right-0 h-4 ${item.color} opacity-80 group-hover:opacity-100 transition-opacity`}></div>}
                                    <span className={`text-2xl font-black mb-1 ${selectedNote === item.note ? 'text-white' : 'text-slate-800'}`}>{item.note}</span>
                                    <div className={`w-8 h-1 rounded-full ${selectedNote === item.note ? 'bg-white/50' : 'bg-slate-300'}`}></div>
                                    {selectedNote === item.note && <div className={`absolute inset-0 opacity-20 animate-pulse ${item.color}`}></div>}
                                </button>
                            ))}
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-in fade-in zoom-in duration-500">
                            <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl">
                                <div className="flex items-center gap-3 mb-6 text-blue-400"><i data-lucide="target"></i><h3 className="font-bold uppercase tracking-wider text-slate-300">Frequency Analysis</h3></div>
                                <div className="space-y-6">
                                    <div><p className="text-xs text-slate-500 font-bold uppercase mb-1">Target Frequency</p><div className="text-3xl font-mono font-bold text-white">{formatValue(currentData.expected)} Hz</div></div>
                                    <div><p className="text-xs text-slate-500 font-bold uppercase mb-1">Measured Result</p><div className="text-3xl font-mono font-bold text-blue-400">{formatValue(currentData.obtained)} Hz</div></div>
                                </div>
                            </div>
                            <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl">
                                <div className="flex items-center gap-3 mb-6 text-indigo-400"><i data-lucide="zap"></i><h3 className="font-bold uppercase tracking-wider text-slate-300">Resistor (R2) Specs</h3></div>
                                <div className="space-y-6">
                                    <div><p className="text-xs text-slate-500 font-bold uppercase mb-1">Theoretical Ideal</p><div className="text-3xl font-mono font-bold text-white">{formatValue(currentData.idealR2, 0)} Ω</div></div>
                                    <div><p className="text-xs text-slate-500 font-bold uppercase mb-1">Final Implemented</p><div className="text-3xl font-mono font-bold text-indigo-400">{formatValue(currentData.realR2, 0)} Ω</div></div>
                                </div>
                            </div>
                            <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl lg:col-span-1 md:col-span-2">
                                <div className="flex items-center gap-3 mb-6 text-emerald-400"><i data-lucide="settings"></i><h3 className="font-bold uppercase tracking-wider text-slate-300">Hardware & Precision</h3></div>
                                <div className="space-y-6">
                                    <div className="bg-slate-800 p-4 rounded-2xl border border-slate-700">
                                        <p className="text-xs text-slate-500 font-bold uppercase mb-2">Recommended Assembly</p>
                                        <div className="text-xl font-bold text-white flex items-center gap-2"><i data-lucide="activity" className="text-emerald-500"></i>{currentData.association}</div>
                                    </div>
                                    <div className={`p-4 rounded-2xl border flex items-center justify-between ${currentData.error < 0.1 ? 'bg-emerald-500/10 border-emerald-500/20 text-emerald-400' : 'bg-amber-500/10 border-amber-500/20 text-amber-400'}`}>
                                        <div><p className="text-xs font-bold uppercase opacity-70">Frequency Deviation</p><div className="text-2xl font-mono font-black">{formatValue(currentData.error)} %</div></div>
                                        <i data-lucide={currentData.error < 0.1 ? "zap" : "alert-triangle"}></i>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="mt-12 p-6 bg-slate-900/50 border border-slate-800 rounded-3xl flex flex-col md:flex-row items-center gap-6">
                            <div className="p-4 bg-indigo-500/10 rounded-2xl border border-indigo-500/10 text-indigo-400"><i data-lucide="volume-2" className="animate-pulse"></i></div>
                            <div className="flex-1">
                                <h4 className="text-indigo-300 font-bold mb-1 uppercase tracking-wider">Auditory Circuit Feedback</h4>
                                <p className="text-slate-400 text-sm leading-relaxed">The sound you hear is a <strong>Square Wave</strong> oscillator set to the "Obtained Frequency" ({formatValue(currentData.obtained)} Hz). This emulates the raw electrical output of your 555 circuit, providing an auditory bridge between the mathematical calculations and the physical hardware auditing.</p>
                            </div>
                        </div>

                        <div className="mt-6 p-8 bg-slate-900/30 border border-slate-800 rounded-3xl relative overflow-hidden mb-12">
                            <div className="flex items-center gap-3 mb-8">
                                <div className="p-2 bg-fuchsia-500/10 rounded-lg border border-fuchsia-500/20 text-fuchsia-400"><i data-lucide="binary"></i></div>
                                <h3 className="font-bold text-lg uppercase tracking-wider text-slate-300">Engineering Equation</h3>
                            </div>
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                                <div className="space-y-4">
                                    <div className="bg-slate-950/50 p-4 rounded-2xl border border-slate-800 font-mono text-center">
                                        <p className="text-slate-500 text-[9px] uppercase mb-2 tracking-widest">Base Formula (Astable Mode)</p>
                                        <div className="text-lg md:text-xl text-white">f = 1,44 / ((R1 + 2R2) * C)</div>
                                    </div>
                                    <div className="bg-slate-950/50 p-4 rounded-2xl border border-fuchsia-500/20 font-mono text-center">
                                        <p className="text-fuchsia-400/60 text-[9px] uppercase mb-2 tracking-widest">R2 Formula</p>
                                        <div className="text-lg md:text-xl text-white italic">R2 = 0,5 * ((1,44 / (f * C)) - R1)</div>
                                    </div>
                                </div>
                                <div className="space-y-4">
                                    <p className="text-slate-400 text-sm border-l-2 border-indigo-500 pl-4 py-1">Substituting values for <span className="text-indigo-400 font-bold">{currentData.note}</span>:</p>
                                    <div className="bg-slate-900/80 p-6 rounded-2xl border border-slate-800 space-y-3 font-mono text-sm">
                                        <div className="flex justify-between text-slate-400"><span>Target Frequency (f):</span><span className="text-white">{formatValue(currentData.expected)} Hz</span></div>
                                        <div className="flex justify-between text-slate-400"><span>Charge Resistor (R1):</span><span className="text-white">1 kΩ</span></div>
                                        <div className="flex justify-between text-slate-400"><span>Capacitance (C):</span><span className="text-white">100 nF (104)</span></div>
                                        <hr className="border-slate-800 my-2" />
                                        <div className="flex justify-between items-center pt-2">
                                            <span className={`font-bold ${currentData.text}`}>Ideal R2 Result:</span>
                                            <span className="text-xl text-white font-bold">{formatValue(currentData.idealR2, 0)} Ω</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <footer className="mt-16 pb-12 border-t border-slate-800/50 pt-10">
                            <div className="mb-10 bg-slate-900/40 border border-indigo-500/20 p-5 rounded-2xl flex flex-col items-center justify-center gap-2">
                                <i data-lucide="shield-alert" className="text-indigo-400"></i>
                                <p className="text-slate-400 font-bold text-[10px] md:text-xs tracking-[0.15em] uppercase text-center max-w-lg">This material is for classroom use only. Reproduction or commercial distribution is strictly prohibited.</p>
                            </div>
                            <div className="flex flex-col md:flex-row justify-between items-center gap-6 text-slate-500 uppercase">
                                <div className="text-[10px] md:text-xs font-black tracking-widest flex items-center gap-2">
                                    <div className="w-1.5 h-1.5 rounded-full bg-indigo-500"></div>
                                    STEAM EDUCATION | PROJECT 01 | ELECTRONIC ORGAN
                                </div>
                                <div className="flex items-center gap-6">
                                    <div className="text-right tracking-widest"><p className="text-[9px] font-bold">System Build</p><p className="text-xs font-mono font-bold text-indigo-400/80">V3.0_STABLE</p></div>
                                    <div className="h-8 w-px bg-slate-800"></div>
                                    <div className="flex items-center gap-3 px-5 py-2 bg-slate-900 border border-slate-800 rounded-xl">
                                        <div className="text-right text-[8px] font-bold tracking-tighter uppercase"><p className="text-slate-600">Project Lead</p><p className="text-xs font-black text-slate-300 tracking-widest">IWAN</p></div>
                                        <div className={`w-8 h-8 rounded-lg flex items-center justify-center text-white font-black text-xs ${currentData.color}`}>IW</div>
                                    </div>
                                </div>
                            </div>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
